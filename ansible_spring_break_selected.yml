#     1. SysAdmin1: On MGMT01, run Get-SmbShare to confirm DepartmentDocs    #
#     2. SysAdmin2: On AD01, run Get-DnsServerScavenging to confirm aging    #
#     3. Harden1: On any host, run Get-SmbServerConfiguration to check SMBv1 #
#     4. Harden2: Check registry for WDigest UseLogonCredential = 0          #
#     5. GPO1: Run auditpol /get /category:"Logon/Logoff" on MGMT01/WKS01   #
#     6. GPO2: Check registry dontdisplaylastusername = 1 on MGMT01/WKS01   #
