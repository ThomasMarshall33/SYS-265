#   Course: SYS-265 Systems Administration                                    #
#                                                                             #
#   Environment:                                                              #
#     - AD01: Windows Server 2022 Core DC (AD DS + DNS)                       #
#     - MGMT01: Windows Server 2022 GUI (Management Server)                   #
#     - WKS01: Windows 11 Client (Domain-joined)                              #
#     - Controller: Ubuntu Server (Ansible Control Node)                       #
#     - Ansible01: Rocky Linux (Standalone)                                   #
#     - Ansible02: Rocky Linux (Standalone)                                   #
#                                                                             #
#   Inventory Groups:                                                         #
#     [windows] -> AD01, MGMT01, WKS01                                       #
#     [rocky]   -> Ansible01, Ansible02                                       #
#                                                                             #
#   Selected Elements (6 total):                                              #
#     SysAdmin 1: Create shared folder + AD security group (G01)              #
#     SysAdmin 2: Configure DNS scavenging on AD01 (G05)                      #
#     Hardening 1: Disable SMBv1 on all Windows hosts (G01)                   #
#     Hardening 2: Disable WDigest authentication (G04)                       #
#     GPO 1: Audit logon events - success + failure (G02)                     #
#     GPO 2: Hide last logged-on username (G05)                               #
#                                                                             #
#   Usage:                                                                    #
#     Test first:  ansible-playbook ansible_spring_break_selected.yml --check #
#     Run it:      ansible-playbook ansible_spring_break_selected.yml         #
